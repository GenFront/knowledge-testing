<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - Библиотека знаний</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/normalize.css">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="icon" href="data:,">
</head>

<body class="topic-page">
    <div class="container">
        <div class="topic-layout">
            <!-- Навигация по теме HTML -->
            <nav class="topic-nav">
                <h3>HTML</h3>
                <ul>
                    <li><a href="#" class="nav-link" data-section="basics">Основы HTML</a></li>
                    <li><a href="#" class="nav-link" data-section="tags">Теги и атрибуты</a></li>
                    <li><a href="#" class="nav-link" data-section="forms">Формы</a></li>
                    <li><a href="#" class="nav-link" data-section="semantics">Семантика</a></li>
                    <li><a href="#" class="nav-link" data-section="tables">Таблицы</a></li>
                    <li><a href="#" class="nav-link" data-section="links">Ссылки</a></li>
                    <li><a href="#" class="nav-link" data-section="entities">Сущности</a></li>
                    <li><a href="#" class="nav-link" data-section="resources">Полезные ресурсы</a></li>
                    <li><a href="materials.html" class="nav-link">Учебные материалы</a></li>
                    <li><a href="tests.html" class="nav-link">Тесты</a></li>
                </ul>
            </nav>

            <!-- Контент по теме HTML -->
            <main class="topic-content">
                <header class="topic-header">
                    <a href="../app.html" class="home-button">← Домой</a>
                    <h1>HTML</h1>
                </header>

                <div id="content-container">
                    <p class="placeholder-text">Выберите раздел из навигации слева, чтобы увидеть соответствующую информацию</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Подключение Font Awesome для иконок -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="../scripts/search.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const navLinks = document.querySelectorAll('.nav-link');
            const contentContainer = document.getElementById('content-container');

            // Данные контента для HTML
            const htmlContent = {
                basics: {
                    title: 'Основы HTML',
                    content: `
                        <p>HTML (HyperText Markup Language) — это язык гипертекстовой разметки, стандартный для документов, предназначенных для отображения в браузере.</p>
                        <p>HTML описывает структуру веб-страницы с помощью разметки. Элементы HTML представлены тегами, которые окружают содержимое и определяют его тип.</p>
                    `
                },
                tags: {
                    title: 'Теги и атрибуты',
                    content: `
                        <p>HTML-теги — это элементы языка, определяющие структуру и содержание веб-страницы. Атрибуты предоставляют дополнительную информацию об элементе.</p>
                        <p>Например, тег <code>&lt;a&gt;</code> используется для создания ссылок, а атрибут <code>href</code> указывает адрес ссылки.</p>
                    `
                },
                forms: {
                    title: 'Формы',
                    content: `
                        <p>HTML-формы позволяют пользователям вводить данные, которые затем могут быть отправлены на сервер для обработки.</p>
                        <p>Формы состоят из различных элементов ввода: текстовых полей, флажков, переключателей, кнопок и т.д.</p>
                    `
                },
                semantics: {
                    title: 'Семантика',
                    content: `
                        <p>Семантическая разметка — это использование HTML-элементов по их прямому назначению, что улучшает доступность и SEO.</p>
                        <p>Примеры семантических тегов: <code>&lt;header&gt;</code>, <code>&lt;nav&gt;</code>, <code>&lt;main&gt;</code>, <code>&lt;section&gt;</code>, <code>&lt;article&gt;</code>, <code>&lt;aside&gt;</code>, <code>&lt;footer&gt;</code>.</p>
                    `
                },
                tables: {
                    title: 'Таблицы',
                    content: `
                        <p>HTML-таблицы используются для представления табличных данных. Они состоят из строк и столбцов ячеек.</p>
                        <p>Основные элементы таблицы: <code>&lt;table&gt;</code>, <code>&lt;thead&gt;</code>, <code>&lt;tbody&gt;</code>, <code>&lt;tr&gt;</code>, <code>&lt;th&gt;</code>, <code>&lt;td&gt;</code>.</p>
                    `
                },
                links: {
                    title: 'Ссылки',
                    content: `
                        <p>Ссылки (гиперссылки) позволяют пользователям перемещаться между страницами. Они создаются с помощью тега <code>&lt;a&gt;</code>.</p>
                        <p>Ссылки могут быть внутренними (на другие страницы сайта) или внешними (на другие сайты).</p>
                    `
                },
                entities: {
                    title: 'Сущности',
                    content: `
                        <p>HTML-сущности — это специальные символы, которые имеют особое значение в HTML и должны быть экранированы.</p>
                        <p>Например, <code>&amp;lt;</code> для символа <, <code>&amp;gt;</code> для символа >, <code>&amp;amp;</code> для символа &.</p>
                    `
                },
                resources: {
                    title: 'Полезные ресурсы',
                    content: `
                        <ul>
                            <li><a href="https://developer.mozilla.org/ru/docs/Web/HTML" target="_blank">MDN Web Docs - HTML</a></li>
                            <li><a href="https://html5book.ru/html-html5/" target="_blank">HTML5Book - HTML</a></li>
                            <li><a href="https://doka.guide/html/" target="_blank">Дока - HTML</a></li>
                            <li><a href="https://htmlacademy.ru/courses/301/run/20" target="_blank">HTML Academy - Разметка текста</a></li>
                        </ul>
                    `
                }
            };

            // Обработчик кликов по навигации
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    if (this.href.endsWith('materials.html') || this.href.endsWith('tests.html')) {
                        // Если это ссылка на материалы или тесты, переходим на страницу
                        window.location.href = this.href;
                        return;
                    }

                    e.preventDefault();
                    const section = this.getAttribute('data-section');

                    // Убираем активный класс у всех ссылок
                    navLinks.forEach(l => l.classList.remove('active'));
                    // Добавляем активный класс текущей ссылке
                    this.classList.add('active');

                    // Показываем контент для выбранного раздела
                    showContent(section);
                });
            });

            // Функция отображения контента
            function showContent(section) {
                if (section && htmlContent[section]) {
                    const sectionData = htmlContent[section];
                    contentContainer.innerHTML = `
                        <h2>${sectionData.title}</h2>
                        ${sectionData.content}
                    `;
                } else {
                    contentContainer.innerHTML = '<p class="placeholder-text">Выберите раздел из навигации слева, чтобы увидеть соответствующую информацию</p>';
                }
            }
        });
    </script>
</body>
</html>
