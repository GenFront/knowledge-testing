        function showArrayTopic(topic) {
            
          console.log("showArrayTopic вызвана");

          if (!arraysContent[topic]) {
            return;
          }

          const topicData = arraysContent[topic];

          console.log(topicData);

          const topicContainer = document.getElementById("array-topic-content");

          console.log(topicContainer);

          if (!topicContainer) {
            return;
          }

          console.log("Сейчас меняем содержимое");

          topicContainer.innerHTML = `
        <h2>${topicData.title}</h2>
        ${topicData.content}
    `;
          console.log(topicContainer.innerHTML);
        }

        // Обработчик кликов по навигации
        navLinks.forEach((link) => {
          link.addEventListener("click", function (e) {
            if (
              this.href.endsWith("materials.html") ||
              this.href.endsWith("tests.html")
            ) {
              // Если это ссылка на материалы или тесты, переходим на страницу
              window.location.href = this.href;
              return;
            }

            e.preventDefault();
            const section = this.getAttribute("data-section");

            // Убираем активный класс у всех ссылок
            navLinks.forEach((l) => l.classList.remove("active"));
            // Добавляем активный класс текущей ссылке
            this.classList.add("active");

            // Показываем контент для выбранного раздела
            showContent(section);
          });
        });

        // Функция отображения контента
        function showContent(section) {
          if (section && jsContent[section]) {
            const sectionData = jsContent[section];

            // Особое отображение для раздела "Массивы"
            if (section === "arrays") {
              contentContainer.innerHTML = `
                <h2>${sectionData.title}</h2>

                <div class="arrays-layout">

                    <div id="arrays-menu">
                        ${sectionData.content}
                    </div>

                    <hr>

                    <div id="array-topic-content">
                        
                    </div>
                </div>
            `;

              return;
            }

            // Отображение остальных разделов
            contentContainer.innerHTML = `
            <h2>${sectionData.title}</h2>
            ${sectionData.content}
        `;
          } else {
            contentContainer.innerHTML =
              '<p class="placeholder-text">Выберите раздел из навигации слева, чтобы увидеть соответствующую информацию</p>';
          }
        }
        /*
==================================================
Обработчик подразделов внутри темы "Массивы"
==================================================

Что делает:

1. Отслеживает клик по ссылкам вида:

   <a class="array-topic" data-topic="indexes">

2. Получает значение data-topic.

   Например:
   data-topic="indexes"

3. Находит соответствующую заметку
   в объекте arraysContent.

4. Подменяет содержимое contentContainer.

Таким образом внутри раздела "Массивы"
появляется возможность открывать
отдельные заметки ("Индексы", "length",
"push()" и т.д.) без перезагрузки страницы.

Связанные объекты:

- arraysContent
- contentContainer
- data-topic

Дата добавления:
02 Июнь 2026
*/
        document.addEventListener("click", function (event) {
          // Проверяем, что клик был именно по ссылке подраздела массива
          if (!event.target.classList.contains("array-topic")) {
            return;
          }
          // Отменяем стандартное поведение ссылки
          event.preventDefault();
          // Получаем название подраздела из data-topic
          const topic = event.target.dataset.topic;

          showArrayTopic(topic);
        });
      });
    </script>
  </body>
</html>
