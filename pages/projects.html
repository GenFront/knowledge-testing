targets[2] → 15000
</code></pre>

<p>
Теперь программа может работать
не с одной целью, а сразу с несколькими.
</p>

<p>
Схема:
</p>

<pre><code>
3000 миль
7500 миль
15000 миль
↓
массив targets
</code></pre>

<p>
Это избавляет от необходимости
создавать отдельную переменную
для каждой цели.
</p>
<hr>

<h3>10. Перебор массива</h3>

<p>
После создания массива необходимо
последовательно обработать каждую цель.
</p>

<p>
Для этого используется цикл:
</p>

<pre><code>
for (let i = 0; i < targets.length; i++) {

}
</code></pre>

<p>
Переменная i хранит индекс элемента массива.
</p>

<p>
На каждой итерации цикла программа получает:
</p>

<pre><code>
targets[i]
</code></pre>

<p>
Пошагово цикл работает так:
</p>

<pre><code>
i = 0
↓
targets[0]
↓
3000

i = 1
↓
targets[1]
↓
7500

i = 2
↓
targets[2]
↓
15000
</code></pre>

<p>
Таким образом одна и та же логика
выполняется для каждой цели.
</p>
<hr>

<h3>11. Сравнение двух вариантов</h3>

<p>
Для каждой цели программа сравнивает
два варианта накопления бонусных миль.
</p>

<pre><code>
let flightsVariantFirst =
    calculateFlights(
        3118,
        true,
        targets[i]
    );

let flightsVariantSecond =
    calculateFlights(
        3617,
        false,
        targets[i]
    );
</code></pre>

<p>
Первый вариант:
</p>

<ul>
    <li>3118 км</li>
    <li>бизнес-класс</li>
</ul>

<p>
Второй вариант:
</p>

<ul>
    <li>3617 км</li>
    <li>эконом-класс</li>
</ul>

<p>
Для каждого маршрута вызывается функция
calculateFlights().
</p>

<p>
В результате получаем:
</p>

<pre><code>
flightsVariantFirst
↓
количество перелётов
для первого варианта

flightsVariantSecond
↓
количество перелётов
для второго варианта
</code></pre>

<p>
После этого результаты можно сравнить
между собой.
</p>
<hr>

<h3>12. Выбор лучшего варианта</h3>

<p>
После расчёта количества перелётов
для каждого маршрута результаты сравниваются.
</p>

<pre><code>
if (
    flightsVariantFirst >
    flightsVariantSecond
) {
    ...
} else {
    ...
}
</code></pre>

<p>
Логика сравнения простая:
</p>

<pre><code>
Меньше перелётов
↓
Быстрее накопление миль
↓
Лучший вариант
</code></pre>

<p>
Если первый вариант требует
больше перелётов:
</p>

<pre><code>
flightsVariantFirst >
flightsVariantSecond
</code></pre>

<p>
Значит второй маршрут позволяет
быстрее накопить нужное количество миль.
</p>

<p>
Иначе выигрывает первый маршрут.
</p>

<p>
На этом этапе программа уже использует:
</p>

<ul>
    <li>функции</li>
    <li>условия</li>
    <li>массивы</li>
    <li>циклы</li>
    <li>Math.ceil()</li>
</ul>

<p>
для принятия решения.
</p>
<hr>

<h3>Что я понял после решения</h3>

<ul>
    <li>
        Функции помогают разделять программу
        на независимые задачи.
    </li>

    <li>
        Одна функция может использовать
        результат другой функции.
    </li>

    <li>
        return позволяет передавать результат
        наружу.
    </li>

    <li>
        Math.ceil() помогает получать
        целое количество действий.
    </li>

    <li>
        Массивы позволяют хранить
        несколько целей одновременно.
    </li>

    <li>
        Цикл позволяет автоматически
        обрабатывать все элементы массива.
    </li>

    <li>
        Декомпозиция делает программу
        проще для чтения и поддержки.
    </li>
</ul>
    `
}
