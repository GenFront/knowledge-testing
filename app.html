<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека знаний по фронтенду</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/normalize.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="data:,">
</head>

<body class="homepage">
    <div class="container">
        <header>
            <h1>Библиотека фронтенд-знаний</h1>
            <p class="subtitle">Выберите тему для изучения</p>
        </header>

        <!-- Поиск -->
        <div class="search-container">
            <input type="text" id="search" placeholder="Поиск по темам...">
        </div>

        <!-- Контейнер для карточек -->
        <section class="simple-cards-grid" id="cards-container">
            <a href="pages/html.html" class="simple-card">
                <div class="card-icon">
                    <i class="fab fa-html5"></i>
                </div>
                <h3>HTML</h3>
                <p>Основы HTML, теги, формы, семантика</p>
            </a>
            
            <a href="pages/css.html" class="simple-card">
                <div class="card-icon">
                    <i class="fab fa-css3-alt"></i>
                </div>
                <h3>CSS</h3>
                <p>Стилизация, флексбокс, гриды, анимации</p>
            </a>
            
            <a href="pages/js.html" class="simple-card">
                <div class="card-icon">
                    <i class="fab fa-js-square"></i>
                </div>
                <h3>JavaScript</h3>
                <p>Основы JS, DOM, события, async</p>
            </a>
            
            <a href="pages/tools.html" class="simple-card">
                <div class="card-icon">
                    <i class="fas fa-tools"></i>
                </div>
                <h3>Инструменты</h3>
                <p>Git, VS Code, сборщики, отладка</p>
            </a>
            
            <a href="pages/projects.html" class="simple-card">
                <div class="card-icon">
                    <i class="fas fa-project-diagram"></i>
                </div>
                <h3>Проекты</h3>
                <p>Практика, задачи, портфолио</p>
            </a>
        </section>

        <!-- Результаты поиска (задачи) -->
        <div id="search-results" class="search-results"></div>
    </div>

    <!-- Font Awesome + модуль приложения -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script type="module" src="src/scripts/app.js"></script>
</body>
</html>
