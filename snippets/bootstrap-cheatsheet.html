<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Шпаргалка: Bootstrap 4 Navbar</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" />
</head>

<body>
    <div class="container mt-4">
        <h1 class="mb-4">Bootstrap 4 Сниппеты</h1>

        <!-- Раздел: Навбары -->
        <section>
            <h2>1. Навбары (b4-navbar)</h2>

            <h3>1.1. Базовый (светлый)</h3>
            <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
                <!--navbar-expand-lg — адаптивное поведение.-->
                <a class="navbar-brand" href="#">
                    <!--Использован navbar-brand (специальный класс для лого)-->
                    <img src="img/logo.svg" width="30" height="30" alt="Логотип" class="d-inline-block align-top" />
                    Brand
                </a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                    <!--navbar-toggler — кнопка для мобильных устройств.-->
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <!--navbar-collapse — раскрывающееся меню.-->
                    <ul class="navbar-nav">
                        <li class="nav-item active">
                            <a class="nav-link" href="#">Главная</a>
                        </li>
                    </ul>
                </div>
            </nav>

            <h3>1.2. Тёмный с выпадающим меню</h3>
            <nav class="navbar navbar-expand-md navbar-dark bg-primary mb-4">
                <a class="navbar-brand" href="#">
                    <img src="img/logo-white.svg" width="120" alt="Логотип" />
                </a>
                <!-- Меню -->
            </nav>
        </section>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>

<div class="card text-left">
  <img class="card-img-top" src="holder.js/100px180/" alt="">
  <div class="card-body">
    <h4 class="card-title">Title</h4>
    <p class="card-text">Body</p>
  </div>
</div>

</body>

</html>
