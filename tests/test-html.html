<body class="topic-page">
    <div class="container">
        <header class="topic-header">
            <a href="../app.html" class="home-button">← Домой</a>
            <h1>Тест по HTML</h1>
        </header>
        
        <main class="topic-content">
            <section>
                <h2>Основы HTML</h2>
                <form class="test-form">
                    <div class="question">
                        <p>1. Что означает аббревиатура HTML?</p>
                        <label><input type="radio" name="q1" value="a"> Hyperlinks and Text Markup Language</label><br>
                        <label><input type="radio" name="q1" value="b"> HyperText Markup Language</label><br>
                        <label><input type="radio" name="q1" value="c"> Home Tool Markup Language</label><br>
                    </div>
                    
                    <div class="question">
                        <p>2. Какой тег используется для создания заголовка самого высокого уровня?</p>
                        <label><input type="radio" name="q2" value="a"> &lt;h6&gt;</label><br>
                        <label><input type="radio" name="q2" value="b"> &lt;h1&gt;</label><br>
                        <label><input type="radio" name="q2" value="c"> &lt;header&gt;</label><br>
                    </div>
                    
                    <div class="question">
                        <p>3. Какой атрибут используется для указания адреса ссылки?</p>
                        <label><input type="radio" name="q3" value="a"> src</label><br>
                        <label><input type="radio" name="q3" value="b"> url</label><br>
                        <label><input type="radio" name="q3" value="c"> href</label><br>
                    </div>
                    
                    <button type="submit">Проверить результаты</button>
                </form>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
