<body class="topic-page">
    <div class="container">
        <header class="topic-header">
            <a href="../app.html" class="home-button">← Домой</a>
            <h1>Тест по CSS</h1>
        </header>
        
        <main class="topic-content">
            <section>
                <h2>Основы CSS</h2>
                <form class="test-form">
                    <div class="question">
                        <p>1. Что означает аббревиатура CSS?</p>
                        <label><input type="radio" name="q1" value="a"> Computer Style Sheets</label><br>
                        <label><input type="radio" name="q1" value="b"> Cascading Style Sheets</label><br>
                        <label><input type="radio" name="q1" value="c"> Creative Style System</label><br>
                    </div>
                    
                    <div class="question">
                        <p>2. Какой селектор используется для выбора элемента по ID?</p>
                        <label><input type="radio" name="q2" value="a"> .id</label><br>
                        <label><input type="radio" name="q2" value="b"> #id</label><br>
                        <label><input type="radio" name="q2" value="c"> @id</label><br>
                    </div>
                    
                    <div class="question">
                        <p>3. Какое свойство используется для изменения цвета текста?</p>
                        <label><input type="radio" name="q3" value="a"> text-color</label><br>
                        <label><input type="radio" name="q3" value="b"> fgcolor</label><br>
                        <label><input type="radio" name="q3" value="c"> color</label><br>
                    </div>
                    
                    <button type="submit">Проверить результаты</button>
                </form>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
